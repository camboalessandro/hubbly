name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      - run: npm ci

      - run: npm ci --prefix ui

      - run: npm run ui:build

      - run: npm run main:build

      - run: npm test

      # Build only — publishing happens once, in the release job below.
      # (Letting each matrix job publish caused duplicate draft releases:
      # parallel jobs raced to create the draft for the same tag.)
      - run: npx electron-builder --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # One published release per tag, with every platform's files attached.
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
